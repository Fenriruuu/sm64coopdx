name: Build - Raspberry Pi

on:
    workflow_dispatch:
    push:
        branches: [ main, dev ]
        paths-ignore:
            - '**.md'
            - 'docs/**'

jobs:
    build-rpi:
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[rpi]') }}
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install cross-compilation toolchain (amd64)
              run: |
                sudo apt update
                sudo apt install -y \
                  build-essential git python3 zip \
                  gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
                  pkg-config

            - name: Add armhf architecture with ports.ubuntu.com source
              run: |
                sudo dpkg --add-architecture armhf
                # Les runners Azure ne servent pas armhf via azure.archive.ubuntu.com
                # On pointe vers ports.ubuntu.com (miroir officiel ARM d'Ubuntu)
                sudo tee /etc/apt/sources.list.d/armhf-ports.list > /dev/null <<'EOF'
                deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
                deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
                deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
                EOF
                # Restreindre les sources existantes à amd64 pour éviter les conflits
                if [ -f /etc/apt/sources.list ]; then
                  sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
                fi
                sudo apt update

            - name: Install ARM sysroot libraries (armhf)
              env:
                PKG_CONFIG_LIBDIR: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
              run: |
                sudo apt install -y \
                  libglew-dev:armhf \
                  libsdl2-dev:armhf \
                  zlib1g-dev:armhf \
                  libcurl4-openssl-dev:armhf \
                  libgles2-mesa-dev:armhf \
                  libdrm-dev:armhf

            - name: Build for Raspberry Pi (ARM32)
              env:
                PKG_CONFIG_LIBDIR: /usr/lib/arm-linux-gnueabihf/pkgconfig:/usr/share/pkgconfig
                PKG_CONFIG_PATH: /usr/lib/arm-linux-gnueabihf/pkgconfig
              run: |
                make -j$(nproc) \
                  TARGET_RPI=1 \
                  CROSS=arm-linux-gnueabihf- \
                  CC=arm-linux-gnueabihf-gcc \
                  CXX=arm-linux-gnueabihf-g++

            - name: Inspect build output
              run: |
                find build -maxdepth 3 -type f | sort | tail -n 200
                ls -lah build/us_pc || true

            - name: Detect launch binary
              run: |
                BIN=$(find build/us_pc -maxdepth 1 -type f \( -name 'sm64coopdx.arm' -o -name 'sm64coopdx' -o -name 'sm64coopdx*' \) | sort | head -n 1)
                test -n "$BIN" || (echo "ERROR: no sm64coopdx binary found in build/us_pc" && exit 1)
                echo "BIN=$BIN" >> "$GITHUB_ENV"
                echo "BIN_NAME=$(basename "$BIN")" >> "$GITHUB_ENV"
                file "$BIN"

            - name: Generate hash
              run: |
                cd tools
                g++ -std=c++17 -o hash_file hash_file.cpp
                echo "::notice ::$(./hash_file ../$BIN)"

            - name: Zip the game
              run: |
                cd build/us_pc
                ZIP_ITEMS="dynos lang mods palettes $BIN_NAME"
                [ -f libdiscord_game_sdk.so ] && ZIP_ITEMS="$ZIP_ITEMS libdiscord_game_sdk.so"
                zip -r sm64coopdx_RaspberryPi.zip $ZIP_ITEMS

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                name: sm64coopdx-raspberrypi
                retention-days: 14
                path: ./build/us_pc/sm64coopdx_RaspberryPi.zip
